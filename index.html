<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent: #D4853A; --dark: #1a1a1a; --cream: #F5F1E8; --text: #2a2a2a; --light: #f0ede6; --border: #e0ddd5; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }
        .landing { display: none; }
        .landing.show { display: block; }
        .landing-nav { padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Playfair Display'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .btn { padding: 0.8rem 1.8rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .hero { padding: 5rem 2rem; text-align: center; }
        .hero h1 { font-family: 'Playfair Display'; font-size: 3.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.1rem; color: #666; margin-bottom: 2rem; }
        .pricing { padding: 5rem 2rem; }
        .pricing h2 { font-family: 'Playfair Display'; font-size: 2.5rem; text-align: center; margin-bottom: 3rem; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .card { background: white; padding: 2.5rem; border-radius: 8px; border: 2px solid var(--border); }
        .card.featured { border-color: var(--accent); background: rgba(212,133,58,0.02); }
        .card h3 { font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .price { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
        .period { color: #999; font-size: 0.9rem; margin-bottom: 2rem; }
        .features { text-align: left; margin: 2rem 0; font-size: 0.95rem; }
        .features li { margin: 0.6rem 0; }
        .auth { display: none; min-height: 100vh; background: linear-gradient(135deg, var(--cream), #faf8f3); align-items: center; justify-content: center; }
        .auth.show { display: flex; }
        .auth-card { background: white; padding: 3rem; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .auth-card h2 { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-card p { color: #999; margin-bottom: 2rem; }
        input { width: 100%; padding: 0.9rem; margin-bottom: 1.2rem; border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Sans'; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212,133,58,0.1); }
        .app { display: none; }
        .app.show { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { background: var(--dark); color: var(--light); padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-brand { font-family: 'Playfair Display'; font-size: 1.8rem; color: var(--accent); margin-bottom: 2rem; }
        .user-info { background: rgba(212,133,58,0.1); padding: 1.2rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.9rem; }
        .tier { color: var(--accent); font-weight: 600; margin-top: 0.5rem; }
        .nav-group { margin-bottom: 2rem; }
        .nav-label { font-size: 0.75rem; text-transform: uppercase; color: rgba(240,237,230,0.4); margin-bottom: 0.75rem; font-weight: 700; }
        .nav-btn { display: block; width: 100%; padding: 0.8rem; background: transparent; border: none; color: rgba(240,237,230,0.8); text-align: left; cursor: pointer; margin-bottom: 0.5rem; border-left: 3px solid transparent; }
        .nav-btn.active { background: rgba(212,133,58,0.15); color: var(--accent); border-left-color: var(--accent); }
        .logout { margin-top: auto; width: 100%; padding: 1rem; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .main { padding: 2.5rem; overflow-y: auto; }
        .tab { display: none; }
        .tab.show { display: block; }
        .header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-family: 'Playfair Display'; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .stat { background: white; padding: 2rem; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-num { font-family: 'Playfair Display'; font-size: 3rem; color: var(--accent); }
        .stat-label { color: #999; margin-top: 0.5rem; }
        .card-box { background: white; padding: 2rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .card-box h3 { font-family: 'Playfair Display'; font-size: 1.2rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Sans'; }
        .opp { background: #faf8f3; padding: 1.2rem; border-radius: 6px; margin-bottom: 0.8rem; border: 1px solid var(--border); }
        .opp-name { font-weight: 600; margin-bottom: 0.3rem; }
        .opp-role { color: #999; font-size: 0.9rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 2.5rem; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-content h3 { font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .app.show { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: 1fr; } }
    </style>
</head>

    <div id="landing"
