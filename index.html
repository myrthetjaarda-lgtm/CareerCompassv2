<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - People Ops Job Search Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent: #D4853A; --dark-bg: #1a1a1a; --cream-bg: #F5F1E8; --text-dark: #2a2a2a; --text-light: #f0ede6; --border: #e0ddd5; --input-bg: #faf8f3; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream-bg); color: var(--text-dark); }
        .landing { display: none; } .landing.active { display: block; }
        .landing-header { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
        .landing-nav { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .landing-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .landing-btn { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .landing-hero { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem; text-align: center; }
        .landing-hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-dark); }
        .landing-hero p { font-size: 1.2rem; color: #666; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .landing-cta { padding: 1.2rem 2.5rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .pricing { max-width: 1200px; margin: 5rem auto 0; padding: 0 2rem 5rem; }
        .pricing-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; text-align: center; margin-bottom: 3rem; }
        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .pricing-card { background: white; padding: 2.5rem; border-radius: 8px; border: 2px solid var(--border); text-align: center; }
        .pricing-card.featured { border-color: var(--accent); background: rgba(212,133,58,0.02); }
        .pricing-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        .pricing-price { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
        .pricing-period { color: #999; font-size: 0.9rem; margin-bottom: 2rem; }
