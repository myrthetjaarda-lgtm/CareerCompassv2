name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    name: Backend Lint & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: ruff check backend/app/

      - name: Format check with Black
        run: black --check backend/app/

      - name: Type check with mypy
        run: mypy backend/app/
        continue-on-error: true

  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: compass
          POSTGRES_PASSWORD: compass_test
          POSTGRES_DB: compass_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://compass:compass_test@localhost:5432/compass_test
        run: |
          cd backend
          alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://compass:compass_test@localhost:5432/compass_test
          REDIS_URL: redis://localhost:6379/1
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-lint:
    runs-on: ubuntu-latest
    name: Frontend Lint & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint

      - name: Type check with TypeScript
        run: |
          cd frontend
          npm run type-check

  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Jest tests
        run: |
          cd frontend
          npm run test -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  docker-build:
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    runs-on: ubuntu-latest
    name: Docker Build Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/Dockerfile.dev
          push: false
          tags: careercompass-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: frontend
          file: frontend/Dockerfile.dev
          push: false
          tags: careercompass-frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit on Python code
        run: |
          pip install bandit
          bandit -r backend/app/ -f json -o bandit-results.json || true

  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker-compose -f docker-compose.dev.yml up -d

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)" != "200" ]]; do sleep 5; done'

      - name: Run integration tests
        run: |
          docker-compose -f docker-compose.dev.yml exec -T backend pytest tests/integration/ -v

      - name: Stop services
        if: always()
        run: docker-compose -f docker-compose.dev.yml down

  summary:
    if: always()
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, docker-build, security-scan]
    runs-on: ubuntu-latest
    name: CI Summary
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.backend-lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.backend-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.frontend-lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.frontend-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then exit 1; fi
          echo "All CI checks passed!"
